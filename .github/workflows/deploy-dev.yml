name: Deploy to Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Generate .env
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          AWS_REGION_CODE: eu-west-1
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

          EXPRESS_COGNITO_CLIENT_ID: ${{ secrets.EXPRESS_COGNITO_CLIENT_ID }}
          EXPRESS_JWT_SECRET: ${{ secrets.EXPRESS_JWT_SECRET }}
          EXPRESS_COGNITO_SECRET: ${{ secrets.EXPRESS_COGNITO_SECRET }}
          EXPRESS_COGNITO_USER_POOL_ID: ${{ secrets.EXPRESS_COGNITO_USER_POOL_ID }}

          EXPRESS_PUBLIC_BACKEND_URL: ${{ vars.EXPRESS_PUBLIC_BACKEND_URL }}
          EXPRESS_PUBLIC_FRONTEND_URL: ${{ vars.EXPRESS_PUBLIC_FRONTEND_URL }}

          EXPRESS_S3_TEMP_BUCKET: ${{ vars.EXPRESS_S3_TEMP_BUCKET }}
          EXPRESS_S3_THUMBNAILS_BUCKET: ${{ vars.EXPRESS_S3_THUMBNAILS_BUCKET }}
          
          EXPRESS_PROVIDUS_TOKEN: ${{ vars.EXPRESS_PROVIDUS_TOKEN }}
          EXPRESS_PROVIDUS_USERNAME: ${{ vars.EXPRESS_PROVIDUS_USERNAME }}
          EXPRESS_PROVIDUS_PASSWORD: ${{ vars.EXPRESS_PROVIDUS_PASSWORD }}
        run: yarn gen:env && yarn gen:serverless:env

      - name: Deploy to Serverless
        run: yarn deploy --stage dev
