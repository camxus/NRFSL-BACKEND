# Auth routes (public)
- httpApi:
    path: /api/auth/signup
    method: POST
- httpApi:
    path: /api/auth/login
    method: POST
- httpApi:
    path: /api/auth/refresh-token
    method: POST
- httpApi:
    path: /api/auth/forgot-password
    method: POST
- httpApi:
    path: /api/auth/confirm-password
    method: POST
- httpApi:
    path: /api/auth/set-new-password
    method: POST
- httpApi:
    path: /api/auth/presign-url
    method: GET
